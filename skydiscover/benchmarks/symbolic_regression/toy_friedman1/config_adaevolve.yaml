# AdaEvolve configuration for symbolic regression (toy Friedman-1 style).
#
# Usage:
#   uv run skydiscover-run initial_program.py evaluator.py -c config_adaevolve.yaml --search adaevolve

max_iterations: 60
checkpoint_interval: 5
log_level: "INFO"
diff_based_generation: true
max_solution_length: 60000
language: "python"

llm:
  models:
    - name: "gpt-5-mini"
      weight: 1.0
  api_base: "https://api.openai.com/v1"
  temperature: 0.6
  max_tokens: 16000
  timeout: 300

search:
  type: adaevolve
  num_context_programs: 4
  database:
    population_size: 20
    num_islands: 2
    migration_interval: 10
    migration_count: 5
    decay: 0.9
    intensity_min: 0.15
    intensity_max: 0.5
    use_unified_archive: true
    fitness_weight: 1.0
    novelty_weight: 0.0
    diversity_strategy: code
    use_adaptive_search: true
    use_ucb_selection: true
    use_migration: true
    use_dynamic_islands: true
    max_islands: 5
    spawn_productivity_threshold: 0.015
    spawn_cooldown_iterations: 30
    use_paradigm_breakthrough: true
    paradigm_window_size: 10
    paradigm_improvement_threshold: 0.12
    paradigm_max_uses: 2
    paradigm_max_tried: 10
    paradigm_num_to_generate: 3
    enable_error_retry: true
    max_error_retries: 2

    pareto_objectives:
      - r2_val
      - structural_complexity
    higher_is_better:
      r2_val: true
      structural_complexity: false
    fitness_key: r2_val
    pareto_objectives_weight: 0.35

prompt:
  system_message: |
    You are improving a symbolic regression solver implemented as a Python program.

    Goal
    - Discover the **equation structure** (which nonlinear transforms, interactions, and features)
      that explain y from X.
    - Fit **all numeric parameters only on the training data** using a serious continuous optimizer.
      Prefer Gaussian-process Bayesian optimization (e.g. scikit-optimize `gp_minimize`) for the
      coefficient vector or parameter vector; fall back to L-BFGS-B only when dimensionality or
      dependencies make GP-BO impractical. Never tune on the validation split.

    Evaluator interface
    - The evaluator calls: fit_and_predict(X_train, y_train, X_val) -> dict
    - Required: y_pred for X_val (finite values).
    - Return equation_template: a SymPy expression using parameter Symbols (p0, p1, …) and
      feature symbols x1..xN so structural complexity reflects the law, not floating constants.
    - Return equation / equation_sympy with numbers substituted after fitting (for readability).

    Rules
    - Do NOT change the signature of fit_and_predict.
    - Add numerical safeguards (epsilons, clipping) for log, division, sqrt, powers.
    - Standardize or otherwise scale features in a documented, consistent way.
    - Keep the library of transforms tractable if you use GP-BO on many coefficients.

evaluator:
  timeout: 120
  max_retries: 2
  cascade_evaluation: false
